<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paid Social — Channel Performance</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green:    #3BAF47; --green-d: #2d8f38; --green-bg: #EBF7EC;
  --gray-50:  #F9FAFB; --gray-100: #F3F4F6; --gray-200: #E5E7EB;
  --gray-400: #9CA3AF; --gray-500: #6B7280; --gray-800: #1F2937;
  --red:      #DC2626; --blue-50: #EFF6FF; --white: #FFFFFF;
  --shadow:   0 1px 3px rgba(0,0,0,.08);
  --r: 6px; --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --label-w: 130px;
}
body { font-family: var(--font); font-size: 13px; color: var(--gray-800); background: var(--gray-100); padding-bottom: 24px; }

/* ── HEADER ── */
.header {
  background: var(--white); border-bottom: 1px solid var(--gray-200);
  padding: 10px 18px; display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap; position: sticky; top: 0; z-index: 300; box-shadow: var(--shadow);
}
.logo { font-size: 15px; font-weight: 700; flex-shrink: 0; }
.sep  { width: 1px; height: 22px; background: var(--gray-200); flex-shrink: 0; }
.fg { display: flex; align-items: center; gap: 5px; }
.fl { font-size: 11px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; }
input[type=date], select {
  font-family: var(--font); font-size: 12px; padding: 4px 8px;
  border: 1px solid var(--gray-200); border-radius: var(--r);
  background: var(--white); color: var(--gray-800); outline: none; cursor: pointer;
}
input[type=date]:focus, select:focus { border-color: var(--green); }
select { max-width: 200px; }
.btn { padding: 5px 12px; font-size: 12px; font-weight: 600; border: none; border-radius: var(--r); cursor: pointer; }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: var(--green-d); }
.btn-clear { background: transparent; color: var(--gray-500); border: 1px solid var(--gray-200); display: none; }
.btn-clear:hover { border-color: var(--red); color: var(--red); }
.upd { font-size: 11px; color: var(--gray-400); margin-left: auto; }

/* ── VIEW TABS ── */
.view-tabs { display: flex; gap: 2px; padding: 12px 18px 0; }
.vt {
  padding: 7px 18px; font-size: 13px; font-weight: 600;
  border: 1px solid transparent; border-bottom: none; border-radius: 6px 6px 0 0;
  cursor: pointer; background: var(--gray-200); color: var(--gray-500);
}
.vt:hover { background: var(--gray-100); color: var(--gray-800); }
.vt.active { background: var(--white); color: var(--green); border-color: var(--gray-200); }

/* ── MAIN ── */
.main { padding: 0 18px 8px; }
.vpanel { display: none; }
.vpanel.active { display: block; }

/* ── CHANNEL SECTION ── */
.ch-section { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--r); box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden; }
.ch-header { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-bottom: 1px solid var(--gray-200); background: var(--gray-50); cursor: pointer; user-select: none; }
.ch-header:hover { background: var(--gray-100); }
.ch-name { font-size: 14px; font-weight: 700; }
.ch-toggle { margin-left: auto; font-size: 11px; color: var(--gray-400); }
.ch-body.collapsed { display: none; }

/* ── TABLE ── */
/* max-height fills the window; short tables shrink naturally */
.tbl-wrap {
  overflow-x: auto;
  overflow-y: auto;
  max-height: calc(100vh - 230px);
  scrollbar-width: thin;
  scrollbar-color: var(--gray-300) transparent;
}
.tbl-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
.tbl-wrap::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }

table { border-collapse: collapse; font-size: 12px; white-space: nowrap; }

/* Frozen label column */
.period-col, .period-label {
  position: sticky; left: 0; z-index: 2; background: var(--white);
  width: var(--label-w);
  min-width: 80px;
  max-width: 600px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
thead .period-col { z-index: 4; background: var(--gray-50); }

thead th {
  position: sticky; top: 0; z-index: 3;
  background: var(--gray-50); border-bottom: 2px solid var(--gray-200);
  padding: 5px 8px; text-align: right; font-weight: 700;
  color: var(--gray-500); font-size: 11px; white-space: nowrap; min-width: 82px;
}
thead th[data-g="Media"]   { border-top: 3px solid #3B82F6; }
thead th[data-g="Funnel"]  { border-top: 3px solid var(--green); }
thead th[data-g="Payback"] { border-top: 3px solid #F59E0B; }

tbody tr { border-bottom: 1px solid var(--gray-100); }
tbody tr:hover td { background: var(--blue-50) !important; }
td { padding: 5px 8px; text-align: right; font-size: 12px; }
.period-label { text-align: left; font-weight: 700; color: var(--gray-800); font-size: 12px; }
.period-label.cur { background: var(--green-bg) !important; color: var(--green); }
td.cur { background: var(--green-bg); }

tr.sum-div td { height: 4px; border: none; }
tr.sum-row td { background: var(--gray-50); font-style: italic; border-top: 1px dashed var(--gray-200); }
tr.sum-row .period-label { color: var(--gray-500); font-size: 11px; font-weight: 700; }

.pos { color: #16A34A; font-weight: 700; }
.neg { color: var(--red); font-weight: 700; }
.neu { color: var(--gray-400); }

/* ── CAMPAIGN REPORT ── */
.camp-controls { display: flex; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--gray-200); background: var(--gray-50); flex-wrap: wrap; align-items: center; }
.camp-section { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--r); box-shadow: var(--shadow); overflow: hidden; }

/* L1 expand rows */
tr.l1-row { cursor: pointer; }
tr.l1-row:hover td { background: var(--green-bg) !important; }
tr.l1-row td.period-label { font-weight: 700; }
.l1-arrow { display: inline-block; width: 14px; font-size: 10px; transition: transform .15s; flex-shrink: 0; }
.l1-label-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.l1-badge { font-size: 10px; color: var(--gray-400); font-weight: 400; margin-left: 4px; white-space: nowrap; }

/* L2 rows */
tr.l2-row td.period-label { padding-left: 24px; color: var(--gray-500); font-weight: 400; font-style: normal; }
tr.l2-row { background: var(--gray-50); }
tr.l2-row:hover td { background: var(--blue-50) !important; }

/* ── MASTER SCROLL BAR ── */
#master-scroll {
  position: fixed; bottom: 0; left: 0; right: 0; height: 16px;
  overflow-x: auto; overflow-y: hidden; z-index: 400;
  background: var(--gray-100); border-top: 1px solid var(--gray-200);
}
#master-scroll-inner { height: 1px; }

/* ── LEGEND ── */
.legend { display: flex; flex-wrap: wrap; gap: 14px; padding: 7px 12px; font-size: 11px; color: var(--gray-500); border-top: 1px solid var(--gray-200); }

/* ── STATES ── */
.msg { padding: 50px 20px; text-align: center; color: var(--gray-400); font-size: 14px; }
.spin { width: 24px; height: 24px; border: 3px solid var(--gray-200); border-top-color: var(--green); border-radius: 50%; animation: sp .7s linear infinite; margin: 0 auto 10px; }
@keyframes sp { to { transform: rotate(360deg); } }

/* ── MULTI-SELECT ── */
.ms-wrap { position: relative; }

.ms-trigger {
  font-family: var(--font); font-size: 12px;
  padding: 4px 8px; border: 1px solid var(--gray-200); border-radius: var(--r);
  background: var(--white); color: var(--gray-800);
  cursor: pointer; display: flex; align-items: center; gap: 5px;
  white-space: nowrap; max-width: 200px; min-width: 110px;
  overflow: hidden; text-overflow: ellipsis;
}
.ms-trigger:hover { border-color: var(--gray-400); }
.ms-trigger.has-sel { border-color: var(--green); color: var(--green); }
.ms-badge {
  background: var(--green); color: #fff; border-radius: 10px;
  padding: 1px 6px; font-size: 10px; font-weight: 700; flex-shrink: 0;
}
.ms-chevron { font-size: 9px; margin-left: auto; flex-shrink: 0; color: var(--gray-400); }

.ms-panel {
  display: none; position: absolute; top: calc(100% + 4px); left: 0;
  min-width: 280px; max-width: 360px; width: max-content;
  background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--r);
  box-shadow: 0 6px 16px rgba(0,0,0,.12); z-index: 2000;
  flex-direction: column; overflow: hidden;
}
.ms-panel.open { display: flex; }

.ms-search-wrap { padding: 8px; border-bottom: 1px solid var(--gray-100); }
.ms-search {
  width: 100%; padding: 5px 8px; font-family: var(--font); font-size: 12px;
  border: 1px solid var(--gray-200); border-radius: var(--r); outline: none;
}
.ms-search:focus { border-color: var(--green); }

.ms-sel-bar {
  padding: 4px 10px; font-size: 11px; display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--gray-100); background: var(--gray-50);
}
.ms-sel-all { background: none; border: none; font-size: 11px; color: var(--green); cursor: pointer; padding: 0; }
.ms-sel-all:hover { text-decoration: underline; }

.ms-list { overflow-y: auto; max-height: 220px; }

.ms-option {
  display: flex; align-items: center; gap: 8px; padding: 5px 10px; cursor: pointer;
}
.ms-option:hover { background: var(--gray-50); }
.ms-option.hidden { display: none; }
.ms-option input[type=checkbox] { cursor: pointer; accent-color: var(--green); flex-shrink: 0; }
.ms-option label { cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; font-size: 12px; }

.ms-footer {
  border-top: 1px solid var(--gray-200); padding: 6px 10px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; background: var(--gray-50);
}
.ms-clear-btn { background: none; border: none; color: var(--red); cursor: pointer; font-size: 11px; padding: 0; }
.ms-clear-btn:hover { text-decoration: underline; }
.ms-count-lbl { color: var(--gray-400); }
.ms-empty { padding: 14px 10px; text-align: center; font-size: 12px; color: var(--gray-400); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <span class="logo">📊 Paid Social — Channel Performance</span>
  <div class="sep"></div>
  <div class="fg"><span class="fl">Start</span><input type="date" id="sd" value="2025-01-01"></div>
  <div class="fg"><span class="fl">End</span><input type="date" id="ed"></div>
  <div class="sep"></div>
  <div class="fg">
    <span class="fl">Campaign</span>
    <div class="ms-wrap">
      <button class="ms-trigger" id="mst-campaign" onclick="msToggle('campaign')">
        <span id="mstl-campaign">All Campaigns</span><span class="ms-chevron">▾</span>
      </button>
      <div class="ms-panel" id="msp-campaign">
        <div class="ms-search-wrap"><input class="ms-search" placeholder="Search campaigns…" oninput="msFilter('campaign',this.value)"></div>
        <div class="ms-sel-bar">
          <button class="ms-sel-all" onclick="msSelectAll('campaign')">Select all visible</button>
          <span class="ms-count-lbl" id="msc-campaign"></span>
        </div>
        <div class="ms-list" id="msl-campaign"></div>
        <div class="ms-footer"><button class="ms-clear-btn" onclick="msClear('campaign')">Clear all</button></div>
      </div>
    </div>
  </div>
  <div class="fg">
    <span class="fl">Ad Group</span>
    <div class="ms-wrap">
      <button class="ms-trigger" id="mst-adGroup" onclick="msToggle('adGroup')">
        <span id="mstl-adGroup">All Ad Groups</span><span class="ms-chevron">▾</span>
      </button>
      <div class="ms-panel" id="msp-adGroup">
        <div class="ms-search-wrap"><input class="ms-search" placeholder="Search ad groups…" oninput="msFilter('adGroup',this.value)"></div>
        <div class="ms-sel-bar">
          <button class="ms-sel-all" onclick="msSelectAll('adGroup')">Select all visible</button>
          <span class="ms-count-lbl" id="msc-adGroup"></span>
        </div>
        <div class="ms-list" id="msl-adGroup"></div>
        <div class="ms-footer"><button class="ms-clear-btn" onclick="msClear('adGroup')">Clear all</button></div>
      </div>
    </div>
  </div>
  <div class="fg">
    <span class="fl">Ad ID</span>
    <div class="ms-wrap">
      <button class="ms-trigger" id="mst-adId" onclick="msToggle('adId')">
        <span id="mstl-adId">All Ad IDs</span><span class="ms-chevron">▾</span>
      </button>
      <div class="ms-panel" id="msp-adId">
        <div class="ms-search-wrap"><input class="ms-search" placeholder="Search ad IDs…" oninput="msFilter('adId',this.value)"></div>
        <div class="ms-sel-bar">
          <button class="ms-sel-all" onclick="msSelectAll('adId')">Select all visible</button>
          <span class="ms-count-lbl" id="msc-adId"></span>
        </div>
        <div class="ms-list" id="msl-adId"></div>
        <div class="ms-footer"><button class="ms-clear-btn" onclick="msClear('adId')">Clear all</button></div>
      </div>
    </div>
  </div>
  <button class="btn btn-green" onclick="render()">Apply</button>
  <button class="btn btn-clear" id="clearBtn" onclick="clearDimFilters()">✕ Clear</button>
  <span class="upd" id="upd"></span>
</div>

<!-- VIEW TABS -->
<div class="view-tabs">
  <div class="vt active" onclick="switchView('daily',this)">Daily</div>
  <div class="vt" onclick="switchView('weekly',this)">Weekly</div>
  <div class="vt" onclick="switchView('monthly',this)">Monthly</div>
  <div class="vt" onclick="switchView('campaign',this)">Campaign Report</div>
</div>

<!-- PANELS -->
<div class="main">
  <div id="pnl-daily"    class="vpanel active"><div class="msg"><div class="spin"></div>Loading…</div></div>
  <div id="pnl-weekly"   class="vpanel"><div class="msg"><div class="spin"></div>Loading…</div></div>
  <div id="pnl-monthly"  class="vpanel"><div class="msg"><div class="spin"></div>Loading…</div></div>
  <div id="pnl-campaign" class="vpanel"><div class="msg"><div class="spin"></div>Loading…</div></div>
</div>


<!-- MASTER HORIZONTAL SCROLLBAR -->
<div id="master-scroll"><div id="master-scroll-inner"></div></div>

<script>
// ── CONSTANTS ────────────────────────────────────────────────────────────────
const CHANNELS = ['Total','Facebook','LinkedIn','YouTube','Reddit'];
const CH_ICONS = {Total:'📊',Facebook:'📘',LinkedIn:'💼',YouTube:'▶️',Reddit:'🔴'};

// Tableau column order: key, label, format, group, lowerIsBetter
const METRICS = [
  ['spend',       'Spend',      '$',  'Media',   false],
  ['impressions', 'Impressions','#',  'Media',   false],
  ['clicks',      'Clicks',     '#',  'Media',   false],
  ['ecpm',        'eCPM',       '$',  'Media',   true ],
  ['ctr',         'CTR',        '%',  'Media',   false],
  ['ecpc',        'eCPC',       '$',  'Media',   true ],
  ['mql1',        'MQL1',       '#',  'Funnel',  false],
  ['cp_mql1',     'CP MQL1',    '$',  'Funnel',  true ],
  ['mql1_ta',     'MQL1 TA',    '#',  'Funnel',  false],
  ['cp_mql1_ta',  'CP MQL1 TA', '$',  'Funnel',  true ],
  ['mql2',        'MQL2',       '#',  'Funnel',  false],
  ['cp_mql2',     'CP MQL2',    '$',  'Funnel',  true ],
  ['mql2_ta',     'MQL2 TA',    '#',  'Funnel',  false],
  ['cp_mql2_ta',  'CP MQL2 TA', '$',  'Funnel',  true ],
  ['dq',          'DQ',         '#',  'Funnel',  true ],
  ['dq_rate',     'DQ Rate',    '%',  'Funnel',  true ],
  ['sal',         'SAL',        '#',  'Funnel',  false],
  ['cp_sal',      'CP SAL',     '$',  'Funnel',  true ],
  ['tql',         'TQL',        '#',  'Funnel',  false],
  ['cp_tql',      'CP TQL',     '$',  'Funnel',  true ],
  ['sao',         'SAO',        '#',  'Funnel',  false],
  ['cp_sao',      'CP SAO',     '$',  'Funnel',  true ],
  ['mql1_to_sao', 'MQL1→SAO',   '%',  'Funnel',  false],
  ['sao_ta',      'SAO TA',     '#',  'Funnel',  false],
  ['cp_sao_ta',   'CP SAO TA',  '$',  'Funnel',  true ],
  ['cw',          'CW',         '#',  'Funnel',  false],
  ['cp_cw',       'CP CW',      '$',  'Funnel',  true ],
  ['sao_to_cw',   'SAO→CW',     '%',  'Funnel',  false],
  ['cw_mrr',      'CW MRR',     '$',  'Funnel',  false],
  ['pbp_months',  'PBP (Mo)',   '.1', 'Payback', true ],
  ['pbp_years',   'PBP (Yr)',   '.2', 'Payback', true ],
];

const RAW_KEYS = ['spend','impressions','clicks','mql1','mql1_ta','mql2','mql2_ta',
                  'mql_total','sal','sal_ta','tql','tql_ta','sao','sao_ta',
                  'cw','cw_ta','cw_mrr','cw_mrr_ta','dq'];

// L1/L2 dimension options for Campaign Report
const DIM_OPTIONS = [
  {key:'ad_campaign_name', label:'Ad Campaign Name'},
  {key:'ad_group_name',    label:'Ad Group Name'},
  {key:'ad_id',            label:'Ad ID'},
  {key:'utm_campaign',     label:'UTM Campaign'},
  {key:'funnel_placement', label:'Funnel Placement'},
  {key:'ad_source',        label:'Ad Source'},
  {key:'subchannel_name',  label:'Subchannel'},
];

// ── STATE ────────────────────────────────────────────────────────────────────
let CHANNEL_DATA  = null;
let CAMPAIGN_DATA = null;
let VIEW    = 'daily';
let COLLAPSED = {};
let CAMP_L1 = 'ad_campaign_name';
let CAMP_L2 = 'ad_group_name';
let CAMP_CH = 'Total';
let CAMP_EXPANDED = {};       // track which L1 rows are expanded

// ── FORMAT ───────────────────────────────────────────────────────────────────
function fmt(v, f) {
  if (v == null || v === '' || isNaN(+v) || !isFinite(+v)) return '<span class="neu">—</span>';
  const n = +v;
  if (f==='$')  return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  if (f==='%')  return (n*100).toFixed(2)+'%';
  if (f==='#')  return Math.round(n).toLocaleString('en-US');
  if (f==='.1') return n.toFixed(1);
  if (f==='.2') return n.toFixed(2);
  return n.toLocaleString();
}
function fmtDelta(v, lib) {
  if (v==null || !isFinite(+v)) return '<span class="neu">—</span>';
  const n = +v;
  const good = lib ? n<0 : n>0;
  const cls = n===0?'neu': good?'pos':'neg';
  const arr = n>0?'▲': n<0?'▼':'';
  return `<span class="${cls}">${arr}${(Math.abs(n)*100).toFixed(1)}%</span>`;
}
const div = (a,b) => (!b||b===0)?null:a/b;

function enrich(r) {
  r.ctr        = div(r.clicks, r.impressions);
  r.ecpm       = r.impressions ? r.spend/(r.impressions/1000) : null;
  r.ecpc       = div(r.spend, r.clicks);
  r.dq_rate    = div(r.dq, r.mql_total);
  r.cp_mql1    = div(r.spend, r.mql1);
  r.cp_mql1_ta = div(r.spend, r.mql1_ta);
  r.cp_mql2    = div(r.spend, r.mql2);
  r.cp_mql2_ta = div(r.spend, r.mql2_ta);
  r.cp_sal     = div(r.spend, r.sal);
  r.cp_tql     = div(r.spend, r.tql);
  r.cp_sao     = div(r.spend, r.sao);
  r.cp_sao_ta  = div(r.spend, r.sao_ta);
  r.cp_cw      = div(r.spend, r.cw);
  r.mql1_to_sao = div(r.sao, r.mql1);
  r.sao_to_cw   = div(r.cw, r.sao);
  r.pbp_months  = div(r.spend, r.cw_mrr);
  r.pbp_years   = r.pbp_months != null ? r.pbp_months/12 : null;
  return r;
}
function sumRows(rows) {
  const s = Object.fromEntries(RAW_KEYS.map(k=>[k,0]));
  rows.forEach(r => RAW_KEYS.forEach(k=>{ s[k]+=(parseFloat(r[k])||0); }));
  return enrich(s);
}

// ── MULTI-SELECT — TABLEAU EXCLUSION MODEL ────────────────────────────────────
// excl = values to EXCLUDE. Empty set = all values pass (default / "All Selected").
// Unchecking an item adds it to excl; checking removes it. "Select All" clears excl.
const MS = {
  campaign: { excl: new Set(), q: '' },
  adGroup:  { excl: new Set(), q: '' },
  adId:     { excl: new Set(), q: '' },
};
const MS_LABELS = { campaign: 'Campaign', adGroup: 'Ad Group', adId: 'Ad ID' };
const MS_FIELDS = { campaign: 'ad_campaign_name', adGroup: 'ad_group_name', adId: 'ad_id' };

function msToggle(dim) {
  const panel = document.getElementById(`msp-${dim}`);
  const wasOpen = panel.classList.contains('open');
  document.querySelectorAll('.ms-panel.open').forEach(p => p.classList.remove('open'));
  if (!wasOpen) panel.classList.add('open');
}

function msFilter(dim, q) {
  MS[dim].q = q.toLowerCase();
  msRenderList(dim);
}

// Available options cascade from upstream non-excluded values
function msGetOptions(dim) {
  if (!CAMPAIGN_DATA) return [];
  let rows = CAMPAIGN_DATA.campaigns;
  if (dim === 'adGroup' && MS.campaign.excl.size > 0)
    rows = rows.filter(r => !MS.campaign.excl.has(String(r[MS_FIELDS.campaign])));
  if (dim === 'adId') {
    if (MS.campaign.excl.size > 0) rows = rows.filter(r => !MS.campaign.excl.has(String(r[MS_FIELDS.campaign])));
    if (MS.adGroup.excl.size  > 0) rows = rows.filter(r => !MS.adGroup.excl.has(String(r[MS_FIELDS.adGroup])));
  }
  const field = MS_FIELDS[dim];
  return [...new Set(rows.map(r => String(r[field])).filter(v => v && v !== 'null' && v !== ''))].sort();
}

function msRenderList(dim) {
  const options = msGetOptions(dim);
  const q    = MS[dim].q;
  const excl = MS[dim].excl;
  const visible = options.filter(v => !q || v.toLowerCase().includes(q));

  // Render "Select All" checkbox in the sel-bar
  const selBar = document.querySelector(`#msp-${dim} .ms-sel-bar`);
  if (selBar) {
    const allChecked = excl.size === 0;
    const incl = options.length - excl.size;
    const countLbl = excl.size > 0 ? `${incl} of ${options.length} selected` : `${options.length} items`;
    selBar.innerHTML = `
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;font-weight:600">
        <input type="checkbox" ${allChecked ? 'checked' : ''} style="accent-color:var(--green);cursor:pointer"
          onchange="msToggleAll('${dim}',this.checked)"> Select All
      </label>
      <span class="ms-count-lbl" id="msc-${dim}">${countLbl}</span>`;
  }

  const list = document.getElementById(`msl-${dim}`);
  if (!visible.length) {
    list.innerHTML = `<div class="ms-empty">${q ? `No matches for "${q}"` : 'No options'}</div>`;
  } else {
    list.innerHTML = visible.map(v => {
      const eid = `msopt_${dim}_${CSS.escape(v)}`;
      const checked = !excl.has(v);  // checked = NOT excluded
      return `<div class="ms-option">
        <input type="checkbox" id="${eid}" ${checked ? 'checked' : ''}
          onchange="msToggleOpt('${dim}',this.dataset.v,this.checked)" data-v="${v.replace(/"/g,'&quot;')}">
        <label for="${eid}" title="${v}">${v}</label>
      </div>`;
    }).join('');
  }
  msUpdateTrigger(dim);
}

function msUpdateTrigger(dim) {
  const options = msGetOptions(dim);
  const excl    = MS[dim].excl;
  const isFiltered = excl.size > 0;
  const included   = options.length - excl.size;
  const trig = document.getElementById(`mst-${dim}`);
  trig.classList.toggle('has-sel', isFiltered);
  const badge = isFiltered ? `<span class="ms-badge">${included}</span>` : '';
  const lbl   = isFiltered ? MS_LABELS[dim] : `All ${MS_LABELS[dim]}s`;
  trig.innerHTML = `<span style="overflow:hidden;text-overflow:ellipsis;flex:1">${lbl}</span>${badge}<span class="ms-chevron">▾</span>`;
}

// "Select All" checkbox — clears or fills excl
function msToggleAll(dim, allChecked) {
  if (allChecked) {
    MS[dim].excl.clear(); // include everything
  } else {
    // Deselect visible options only (respects search)
    msGetOptions(dim).filter(v => {
      const q = MS[dim].q;
      return !q || v.toLowerCase().includes(q);
    }).forEach(v => MS[dim].excl.add(v));
  }
  msRenderList(dim);
  updateClearBtn();
}

// Individual checkbox toggle: checked = re-include (remove from excl); unchecked = exclude
function msToggleOpt(dim, val, checked) {
  if (checked) MS[dim].excl.delete(val);
  else         MS[dim].excl.add(val);
  msRenderList(dim);
  updateClearBtn();
}

// "Select all visible" button — kept for the static HTML button; same as clicking Select All checkbox
function msSelectAll(dim) { msToggleAll(dim, true); }

// "Clear all" footer button — same as select-all (clears all exclusions)
function msClear(dim) {
  MS[dim].excl.clear(); MS[dim].q = '';
  const s = document.querySelector(`#msp-${dim} .ms-search`);
  if (s) s.value = '';
  msRenderList(dim);
  updateClearBtn();
}

// Filter is active when any dimension has exclusions
function msHasDim() { return MS.campaign.excl.size>0 || MS.adGroup.excl.size>0 || MS.adId.excl.size>0; }

function msPopulate() { ['campaign','adGroup','adId'].forEach(d => msRenderList(d)); }

// Apply MS excl filters to a rows array — used by Campaign Report and future daily rollup
function msFilterRows(rows) {
  if (MS.campaign.excl.size > 0) rows = rows.filter(r => !MS.campaign.excl.has(String(r.ad_campaign_name)));
  if (MS.adGroup.excl.size  > 0) rows = rows.filter(r => !MS.adGroup.excl.has(String(r.ad_group_name)));
  if (MS.adId.excl.size     > 0) rows = rows.filter(r => !MS.adId.excl.has(String(r.ad_id)));
  return rows;
}

// Close panels on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.ms-wrap'))
    document.querySelectorAll('.ms-panel.open').forEach(p => p.classList.remove('open'));
});

// ── FILTER HELPERS ────────────────────────────────────────────────────────────
function getF() {
  return {
    sd: document.getElementById('sd').value,
    ed: document.getElementById('ed').value,
  };
}

// Channel views use date-level daily data (no campaign field — dim filters n/a here)
function srcRows(ch, f) {
  const rows = CHANNEL_DATA.daily;
  return ch==='Total' ? rows : rows.filter(r=>r.channel===ch);
}

// ── AGGREGATION ───────────────────────────────────────────────────────────────
const ds = d=>d.toISOString().slice(0,10);
function weekStart(d) {
  const x=new Date(d); x.setHours(0,0,0,0);
  x.setDate(x.getDate()-(x.getDay()+6)%7); return x;
}

function aggWeekly(ch, f) {
  // Use end date for weekly window (item 6)
  const end   = new Date(f.ed+'T00:00:00');
  const start = new Date(f.sd+'T00:00:00');
  const endMon = weekStart(end);
  const buckets = Array.from({length:7},(_,i)=>({wn:i,rows:[]}));
  for (const row of srcRows(ch,f)) {
    const d = new Date(row.date+'T00:00:00');
    if (d<start||d>end) continue;
    const wn = Math.round((endMon-weekStart(d))/(7*864e5));
    if (wn>=0&&wn<=6) buckets[wn].rows.push(row);
  }
  return buckets.map(({wn,rows})=>{
    const wMon=new Date(endMon); wMon.setDate(wMon.getDate()-wn*7);
    const wSun=new Date(wMon);   wSun.setDate(wSun.getDate()+6);
    return {label:wn===0?'This Week':wn===1?'Week −1':`Week −${wn}`, sub:`${ds(wMon)} – ${ds(wSun)}`, isCurrent:wn===0, ...sumRows(rows)};
  });
}

function aggDaily(ch, f) {
  // Same day-of-week at 7-day intervals from end date (item 6)
  const end   = new Date(f.ed+'T00:00:00');
  const start = new Date(f.sd+'T00:00:00');
  const result=[];
  for (let i=0;i<=6;i++) {
    const t=new Date(end); t.setDate(t.getDate()-i*7);
    if (t<start) break;
    const dateStr=ds(t);
    const rows=srcRows(ch,f).filter(r=>r.date===dateStr);
    result.push({label:dateStr, isCurrent:i===0, ...sumRows(rows)});
  }
  return result;
}

function aggMonthly(ch, f) {
  const buckets={};
  for (const row of srcRows(ch,f)) {
    if (row.date<f.sd||row.date>f.ed) continue;
    const mo=row.date.slice(0,7);
    (buckets[mo]=buckets[mo]||[]).push(row);
  }
  return Object.entries(buckets).sort(([a],[b])=>b.localeCompare(a))
    .map(([mo,rows])=>({
      label:new Date(mo+'-02T00:00:00').toLocaleDateString('en-US',{month:'short',year:'numeric'}),
      isCurrent:mo===new Date().toISOString().slice(0,7),
      ...sumRows(rows),
    }));
}

// ── SUMMARY ROWS ──────────────────────────────────────────────────────────────
function calcWoW(p) {
  const c=p[0],pr=p[1]; if(!c||!pr) return null;
  return Object.fromEntries(METRICS.map(([k])=>{
    const cv=c[k],pv=pr[k];
    return [k,(cv!=null&&pv!=null&&pv!==0)?(cv-pv)/Math.abs(pv):null];
  }));
}
function calc6Avg(p) {
  const prior=p.slice(1,7); if(!prior.length) return null;
  const s=Object.fromEntries(RAW_KEYS.map(k=>[k,0]));
  prior.forEach(r=>RAW_KEYS.forEach(k=>{s[k]+=(r[k]||0)/prior.length;}));
  return enrich(s);
}
function calcPctAvg(p, avg) {
  const c=p[0]; if(!c||!avg) return null;
  return Object.fromEntries(METRICS.map(([k])=>{
    const cv=c[k],av=avg[k];
    return [k,(cv!=null&&av!=null&&av!==0)?(cv-av)/Math.abs(av):null];
  }));
}

// ── TABLE BUILDER ─────────────────────────────────────────────────────────────
// Tableau layout: periods as rows, metric names as column headers
function buildTable(periods, vt) {
  if (!periods?.length) return '<div class="msg" style="padding:20px">No data.</div>';
  const wow=calcWoW(periods), avg6=calc6Avg(periods), pct=calcPctAvg(periods,avg6);
  const wL=vt==='monthly'?'MoM % Change':'WoW % Change';
  const aL=vt==='monthly'?'6-Month Avg':'6-Week Avg';
  const pL=vt==='monthly'?'% vs 6-Mo Avg':'% vs 6-Wk Avg';

  const mHdr=METRICS.map(([,l,,g])=>`<th data-g="${g}">${l}</th>`).join('');

  const pRows=periods.map(p=>{
    const cells=METRICS.map(([k,,f])=>`<td class="${p.isCurrent?'cur':''}">${fmt(p[k],f)}</td>`).join('');
    return `<tr><td class="period-label${p.isCurrent?' cur':''}" title="${p.sub||p.label}">${p.label}</td>${cells}</tr>`;
  }).join('');

  const sRow=(lbl,obj,isDelta)=>{
    if(!obj) return '';
    const cells=METRICS.map(([k,,f,,lib])=>`<td>${isDelta?fmtDelta(obj[k],lib):fmt(obj[k],f)}</td>`).join('');
    return `<tr class="sum-row"><td class="period-label">${lbl}</td>${cells}</tr>`;
  };

  return `<table>
    <thead><tr><th class="period-col"></th>${mHdr}</tr></thead>
    <tbody>
      ${pRows}
      <tr class="sum-div"><td colspan="${METRICS.length+1}"></td></tr>
      ${sRow(wL,wow,true)}${sRow(aL,avg6,false)}${sRow(pL,pct,true)}
    </tbody>
  </table>`;
}

// ── CHANNEL SECTION ───────────────────────────────────────────────────────────
function buildSection(ch, periods, vt, vKey) {
  const key=`${vKey}_${ch}`, col=COLLAPSED[key]||false;
  return `<div class="ch-section" id="sec_${key}">
    <div class="ch-header" onclick="toggleSec('${key}')">
      <span>${CH_ICONS[ch]}</span>
      <span class="ch-name">${ch}</span>
      <span class="ch-toggle">${col?'▼ expand':'▲ collapse'}</span>
    </div>
    <div class="ch-body${col?' collapsed':''}" id="body_${key}">
      <div class="tbl-wrap" data-view="${vKey}">${buildTable(periods,vt)}</div>
      <div class="legend">
        <span>🟢 Current period</span>
        <span style="font-style:italic;color:var(--gray-400)">Italic = summary rows</span>
        <span><span class="pos">▲</span>/<span class="neg">▼</span> cost metrics inverted</span>
        <span style="color:#3B82F6">■ Media</span>
        <span style="color:var(--green)">■ Funnel</span>
        <span style="color:#F59E0B">■ Payback</span>
      </div>
    </div>
  </div>`;
}

function toggleSec(key) {
  COLLAPSED[key]=!COLLAPSED[key];
  document.getElementById(`body_${key}`).classList.toggle('collapsed',COLLAPSED[key]);
  document.querySelector(`#sec_${key} .ch-toggle`).textContent=COLLAPSED[key]?'▼ expand':'▲ collapse';
}

// ── CAMPAIGN REPORT ───────────────────────────────────────────────────────────
function buildCampaignReport() {
  if (!CAMPAIGN_DATA) return '<div class="msg">Campaign data loading…</div>';

  const dimSel = (val) => DIM_OPTIONS.map(o =>
    `<option value="${o.key}"${o.key===val?' selected':''}>${o.label}</option>`
  ).join('');
  const chSel = CHANNELS.map(c =>
    `<option value="${c}"${c===CAMP_CH?' selected':''}>${CH_ICONS[c]} ${c}</option>`
  ).join('');
  const l1Label = DIM_OPTIONS.find(o=>o.key===CAMP_L1)?.label || 'L1';
  const l2Label = DIM_OPTIONS.find(o=>o.key===CAMP_L2)?.label || 'L2';

  let rows = CAMP_CH==='Total'
    ? CAMPAIGN_DATA.campaigns
    : CAMPAIGN_DATA.campaigns.filter(r=>r.channel===CAMP_CH);
  rows = msFilterRows(rows); // apply header Campaign / Ad Group / Ad ID filters

  // Group by L1
  const l1Map = {};
  rows.forEach(r => {
    const v = r[CAMP_L1] || '(none)';
    (l1Map[v] = l1Map[v] || []).push(r);
  });

  const l1Sorted = Object.entries(l1Map).sort(([,a],[,b]) =>
    b.reduce((s,r)=>s+(+r.spend||0),0) - a.reduce((s,r)=>s+(+r.spend||0),0)
  );

  const mHdr = METRICS.map(([,l,,g]) => `<th data-g="${g}">${l}</th>`).join('');

  let tBody = '';
  for (const [l1val, l1rows] of l1Sorted) {
    const agg   = sumRows(l1rows);
    const cells = METRICS.map(([k,,f]) => `<td>${fmt(agg[k],f)}</td>`).join('');
    const key   = encodeURIComponent(l1val);
    const isExp = !!CAMP_EXPANDED[key];

    // Count distinct L2 values for badge
    const l2vals = [...new Set(l1rows.map(r=>r[CAMP_L2]).filter(Boolean))];
    const badge  = l2vals.length > 0
      ? `<span class="l1-badge">(${l2vals.length} ${l2Label.toLowerCase()}${l2vals.length!==1?'s':''})</span>`
      : '';

    tBody += `<tr class="l1-row" onclick="toggleCampL2('${key}')">
      <td class="period-label" title="${l1val}">
        <span class="l1-arrow" id="arr_${key}">${isExp ? '▼' : '▶'}</span>
        <span class="l1-label-text">${l1val}</span>${badge}
      </td>${cells}
    </tr>`;

    // L2 rows — visible if expanded
    if (isExp) {
      const l2Map = {};
      l1rows.forEach(r => {
        const v = r[CAMP_L2] || '(none)';
        (l2Map[v] = l2Map[v] || []).push(r);
      });
      const l2Sorted = Object.entries(l2Map).sort(([,a],[,b]) =>
        b.reduce((s,r)=>s+(+r.spend||0),0) - a.reduce((s,r)=>s+(+r.spend||0),0)
      );
      for (const [l2val, l2rows] of l2Sorted) {
        const agg2   = sumRows(l2rows);
        const cells2 = METRICS.map(([k,,f]) => `<td>${fmt(agg2[k],f)}</td>`).join('');
        tBody += `<tr class="l2-row">
          <td class="period-label" title="${l2val}">↳ ${l2val}</td>${cells2}
        </tr>`;
      }
    }
  }

  return `<div class="camp-section">
    <div class="camp-controls">
      <div class="fg"><span class="fl">Channel</span>
        <select onchange="CAMP_CH=this.value;CAMP_EXPANDED={};renderView('campaign')">${chSel}</select>
      </div>
      <div class="fg"><span class="fl">L1</span>
        <select onchange="CAMP_L1=this.value;CAMP_EXPANDED={};renderView('campaign')">${dimSel(CAMP_L1)}</select>
      </div>
      <div class="fg"><span class="fl">L2</span>
        <select onchange="CAMP_L2=this.value;renderView('campaign')">${dimSel(CAMP_L2)}</select>
      </div>
      <span style="font-size:11px;color:var(--gray-400);margin-left:auto">
        Click any row to expand ${l2Label} detail
      </span>
    </div>
    <div class="tbl-wrap" data-view="campaign">
      <table class="camp-tbl">
        <thead><tr>
          <th class="period-col" style="text-align:left">${l1Label}</th>${mHdr}
        </tr></thead>
        <tbody>${tBody}</tbody>
      </table>
    </div>
  </div>`;
}

function toggleCampL2(key) {
  CAMP_EXPANDED[key] = !CAMP_EXPANDED[key];
  renderView('campaign');  // re-render to show/hide L2 rows
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderView(v) {
  if (!CHANNEL_DATA) return;
  const f=getF();

  if (v==='campaign') {
    document.getElementById('pnl-campaign').innerHTML = buildCampaignReport();
    syncMasterScroll();
    requestAnimationFrame(positionResizer);
    return;
  }

  let sections='';
  for (const ch of CHANNELS) {
    let periods;
    if (v==='weekly')  periods=aggWeekly(ch,f);
    if (v==='daily')   periods=aggDaily(ch,f);
    if (v==='monthly') periods=aggMonthly(ch,f);
    sections+=buildSection(ch,periods,v,v);
  }
  document.getElementById(`pnl-${v}`).innerHTML=sections;
  syncMasterScroll();
}

function render() {
  updateClearBtn();
  renderView(VIEW);
}

function switchView(v, el) {
  VIEW=v;
  document.querySelectorAll('.vt').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.vpanel').forEach(p=>p.classList.remove('active'));
  document.getElementById(`pnl-${v}`).classList.add('active');
  const defaultW = v === 'campaign' ? '260px' : '130px';
  document.documentElement.style.setProperty('--label-w', defaultW);
  // Campaign has one table with its own scrollbar — no master sync needed
  document.getElementById('master-scroll').style.display = v === 'campaign' ? 'none' : '';
  document.body.style.paddingBottom = v === 'campaign' ? '0' : '';
  renderView(v);
}

function clearDimFilters() {
  ['campaign','adGroup','adId'].forEach(dim => {
    MS[dim].excl.clear(); MS[dim].q = '';
    const s = document.querySelector(`#msp-${dim} .ms-search`);
    if (s) s.value = '';
  });
  msPopulate();
  updateClearBtn();
  render();
}

function updateClearBtn() {
  document.getElementById('clearBtn').style.display = msHasDim() ? '' : 'none';
}

// ── MASTER SCROLL BAR ─────────────────────────────────────────────────────────
// One scrollbar at bottom, synced to all visible tbl-wrap elements
let scrollSyncing=false;

function syncMasterScroll() {
  requestAnimationFrame(()=>{
    const wraps=[...document.querySelectorAll(`.vpanel.active .tbl-wrap`)];
    if (!wraps.length) return;
    const maxW=Math.max(...wraps.map(w=>w.scrollWidth));
    document.getElementById('master-scroll-inner').style.width=maxW+'px';
  });
}

document.getElementById('master-scroll').addEventListener('scroll', function() {
  if (scrollSyncing) return;
  scrollSyncing=true;
  const sl=this.scrollLeft;
  document.querySelectorAll('.vpanel.active .tbl-wrap').forEach(w=>{ w.scrollLeft=sl; });
  scrollSyncing=false;
});

// Also sync master when a tbl-wrap scrolls
document.addEventListener('scroll', function(e) {
  if (!e.target.classList?.contains('tbl-wrap')) return;
  if (scrollSyncing) return;
  scrollSyncing=true;
  document.getElementById('master-scroll').scrollLeft=e.target.scrollLeft;
  document.querySelectorAll('.vpanel.active .tbl-wrap').forEach(w=>{ w.scrollLeft=e.target.scrollLeft; });
  scrollSyncing=false;
}, true);

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function init() {
  document.getElementById('ed').value=new Date().toISOString().slice(0,10);

  try {
    const r=await fetch('data/channel_data.json');
    if (!r.ok) throw new Error('channel_data.json not found');
    CHANNEL_DATA=await r.json();
    CHANNEL_DATA.daily.forEach(row=>RAW_KEYS.forEach(k=>{ row[k]=parseFloat(row[k])||0; }));
    if (CHANNEL_DATA.generated_at) {
      const d=new Date(CHANNEL_DATA.generated_at);
      document.getElementById('upd').textContent='Data as of '+d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    }
    render();
  } catch(e) {
    ['weekly','daily','monthly','campaign'].forEach(v=>
      document.getElementById(`pnl-${v}`).innerHTML=`<div class="msg">⚠️ ${e.message}</div>`
    );
  }

  // Background: campaign data (filters + campaign report)
  try {
    const r=await fetch('data/campaign_data.json');
    if (r.ok) {
      CAMPAIGN_DATA=await r.json();
      // Normalize campaign rows
      if (CAMPAIGN_DATA.campaigns) {
        CAMPAIGN_DATA.campaigns.forEach(row=>{
          RAW_KEYS.forEach(k=>{ row[k]=parseFloat(row[k])||0; });
        });
      }
      // Also keep daily rows if present for dim filters
      if (CAMPAIGN_DATA.daily) {
        CAMPAIGN_DATA.daily.forEach(row=>{
          RAW_KEYS.forEach(k=>{ row[k]=parseFloat(row[k])||0; });
          row.date=row.activity_date||row.date;
        });
      }
      msPopulate();
      if (VIEW==='campaign') renderView('campaign');
    }
  } catch(e) { console.warn('campaign_data.json:', e.message); }
}

document.getElementById('sd').addEventListener('change', render);
document.getElementById('ed').addEventListener('change', render);
init();
</script>
