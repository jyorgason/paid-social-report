name: Refresh Report Data

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily (midnight MT / 11pm PT)
  workflow_dispatch:       # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Generate report data
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
        run: python scripts/generate_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/channel_data.json
          if git diff --staged --quiet; then
            echo "No data changes, skipping commit."
          else
            git commit -m "chore: refresh report data $(date -u +%Y-%m-%d)"
            git push
          fi
